### {{ ansible_managed }}

# This common-config is used to configure items used for both ssm and cloudwatch access


## Configuration for shared credential.
## Default credential strategy will be used if it is absent here:
##            Instance role is used for EC2 case by default.
##            AmazonCloudWatchAgent profile is used for the on-premises case by default.
[credentials]
  shared_credential_profile = "AmazonCloudWatchAgent"
  shared_credential_file= "/localhome/poduser/iamra/aws-credentials"

## Configuration for proxy.
## System-wide environment-variable will be read if it is absent here.
## i.e. HTTP_PROXY/http_proxy; HTTPS_PROXY/https_proxy; NO_PROXY/no_proxy
## Note: system-wide environment-variable is not accessible when using ssm run-command.
## Absent in both here and environment-variable means no proxy will be used.
[proxy]
  http_proxy = "{{ proxy }}"
  https_proxy = "{{ proxy }}"
  no_proxy = "127.0.0.1,.web.local"
  # doesn't work, both in that it doesn't get picked up and even if forced from the environment, it doesn't work
  AWS_EC2_METADATA_SERVICE_ENDPOINT = "http://127.0.0.1:9911"
