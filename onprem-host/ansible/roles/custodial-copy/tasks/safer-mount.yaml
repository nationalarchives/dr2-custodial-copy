- name: Check if {{ path }} exists
  stat:
    path: "{{ path }}"
  register: st_mount
  ignore_errors: "yes"

- name: Create and set no-access perms on {{ path }} if it's non-existent
  file:
    path: "{{ path }}"
    state: directory
    owner: nobody
    group: nobody
    mode: a-rwx
  when:
    - st_mount.stat is defined
    - st_mount.stat.exists == false


- name: Create dummy file in underlying mountpoint
  file:
    path: "{{ path }}/NOT MOUNTED!!"
    state: file
    owner: nobody
    group: nobody
    mode: a-rwx
  when:
    - st_mount.stat is defined
    - st_mount.stat.exists == false

- name: Mount {{ path }}
  mount:
    src: "{{ src }}"
    path: "{{ path }}"
    state: mounted
    fstype: "{{ fstype }}"
    opts: "{{ opts }}"
  register: mounted

- name: systemctl daemon-reload
  systemd_service:
    daemon-reload: true
  when: mounted.changed
